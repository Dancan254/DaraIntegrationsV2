name: STKPushDaraja CI

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main

jobs:

  build-and-test:
    name: Build and Test
    runs-on: linux
    java-version: 21
    steps:
      - name: Checkout
        uses: git-checkout

      - name: Compile
        run: mvn clean compile -q

      - name: Run Tests
        run: mvn test

      - name: Package JAR
        run: mvn package -DskipTests -q
